[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra
markers =
    unit: fast deterministic unit tests
    contract: deterministic architecture and behavior contract tests
    integration: API/service integration tests
    e2e: end-to-end workflow tests
    manual: opt-in manual or real-agent tests
    real_agent: tests that require installed Qwen/OpenCode or external agent CLIs
    soak: long-running resilience or repeated-execution tests

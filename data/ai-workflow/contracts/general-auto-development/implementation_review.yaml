id: implementation_review
key: implementation_review
name: Implementation Review
description: AI reviews completed task loop output against spec/todo/task results
  and checks test evidence. FAIL returns repair prompts to Execute Task Loop.
enabled: true
type: review
skill: steps/general-auto-development/02_implementation_review.md
command: ''
agent: qwen
outputs:
- final-review.md
function: ''
retry: 2
failAction: selected_step
retryFromStepKey: build
retryEscalationEvery: 0
keepSameSession: false
injectFailureFeedback: true
stopAfterFailures: 2
allowInteraction: false
thinking: true
thinkingLevel: medium
approvalRequired: false
pauseAfterStep: false
approvalMessage: ''
timeoutEnabled: true
timeoutMinutes: 3.0
reviewMode: new_agent
confidenceThreshold: 0.75
passKeywords: PASS
failKeywords: FAIL, BLOCKED, RISK
aggregatorFunction: keyword_confidence
sources: []
agentOptions: {}
path: contracts/general-auto-development/implementation_review.yaml
compactPrompt: true
includeSkillContext: false
compactRetryPromptWhenReusingSession: true
reviewOutputFormat: json
retryPolicy:
  defaultRetryTo: build
  escalateEvery: 0
  maxRetries: 2
maxRetries: 2

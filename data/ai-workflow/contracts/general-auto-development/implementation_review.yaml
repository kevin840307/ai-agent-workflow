id: implementation_review
key: implementation_review
name: Implementation Review
description: Ask the AI reviewer to check whether the task plan is concrete, bounded, and executable. The platform does not rewrite the plan.
enabled: true
type: review
skill: steps/general-auto-development/02_implementation_review.md
command: ''
agent: qwen
outputs:
- implementation-review.md
function: ''
retry: 99
failAction: selected_step
retryFromStepKey: plan_tasks
keepSameSession: true
injectFailureFeedback: true
stopAfterFailures: 99
allowInteraction: false
thinking: true
thinkingLevel: medium
approvalRequired: false
pauseAfterStep: false
approvalMessage: ''
timeoutEnabled: true
timeoutMinutes: 3.0
reviewMode: new_agent
confidenceThreshold: 0.7
passKeywords: PASS, APPROVED
failKeywords: FAIL, BLOCKED, RISK
aggregatorFunction: keyword_confidence
sources: []
agentOptions: {}
path: contracts/general-auto-development/implementation_review.yaml
compactPrompt: true
includeSkillContext: false
compactRetryPromptWhenReusingSession: true

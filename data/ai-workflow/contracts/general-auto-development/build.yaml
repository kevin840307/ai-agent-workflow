id: build
key: build
name: Execute Task Loop
description: Execute AI-generated task prompts one by one in the same Qwen/OpenCode session. The platform checks direct project edits but does not write files for the agent.
enabled: true
type: ai
skill: steps/general-auto-development/03_build.md
command: ''
agent: qwen
outputs:
- build-result.md
function: ''
retry: 99
failAction: same_step
retryFromStepKey: build
retryEscalationEvery: 3
retryEscalationStepKey: plan_tasks
keepSameSession: true
injectFailureFeedback: true
stopAfterFailures: 99
requireSubstantiveBuild: true
allowTestFilesInTaskLoop: true
allowInteraction: false
thinking: true
thinkingLevel: medium
approvalRequired: false
pauseAfterStep: false
approvalMessage: ''
timeoutEnabled: true
timeoutMinutes: 3.0
reviewMode: none
confidenceThreshold: 0.75
passKeywords: PASS, APPROVED
failKeywords: FAIL, BLOCKED
aggregatorFunction: ''
sources: []
agentOptions: {}
path: contracts/general-auto-development/build.yaml
compactPrompt: true
enableTaskLoop: true
repromptOnToolCallJson: false
includeSkillContext: false
compactRetryPromptWhenReusingSession: true

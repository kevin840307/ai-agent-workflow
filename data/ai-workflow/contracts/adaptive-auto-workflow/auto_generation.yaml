id: auto_generation
key: auto_generation
name: Execute Prompts
description: Execute AI-generated prompts through the same Qwen/OpenCode CLI session with direct project edits and optional tests.
enabled: true
type: ai
skill: steps/adaptive-auto-workflow/00_auto_generation.md
command: ''
agent: qwen
outputs:
- auto-generation-result.md
function: ''
retry: 99
maxRetries: 99
failAction: selected_step
retryFromStepKey: auto_generation
retryEscalationEvery: 3
retryEscalationStepKey: generate_task_prompts
keepSameSession: true
injectFailureFeedback: true
stopAfterFailures: 99
allowInteraction: false
thinking: true
thinkingLevel: medium
approvalRequired: false
pauseAfterStep: false
approvalMessage: ''
timeoutEnabled: true
timeoutMinutes: 5.0
reviewMode: none
confidenceThreshold: 0.75
passKeywords: PASS, APPROVED
failKeywords: FAIL, BLOCKED
aggregatorFunction: ''
sources: []
agentOptions: {}
path: contracts/adaptive-auto-workflow/auto_generation.yaml
compactPrompt: true
enableTaskLoop: true
includeSkillContext: false
compactRetryPromptWhenReusingSession: true

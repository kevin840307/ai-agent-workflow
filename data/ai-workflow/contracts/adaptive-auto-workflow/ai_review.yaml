id: ai_review
key: ai_review
name: AI Review + Validation
description: Run AI review against SPEC, check tests, then run validation.py or project
  tests. Failures repair from Execute Prompts, with periodic escalation back to Generate
  Execution Prompts.
enabled: true
type: review
skill: steps/adaptive-auto-workflow/01_ai_review.md
command: ''
agent: qwen
outputs:
- ai-review.md
- external-validation-result.md
function: adaptive_python_gate
functions:
- adaptive_python_gate
retry: 99
maxRetries: 99
failAction: selected_step
retryFromStepKey: auto_generation
retryEscalationEvery: 3
retryEscalationStepKey: generate_task_prompts
keepSameSession: true
injectFailureFeedback: true
stopAfterFailures: 99
allowInteraction: false
requiresValidationScript: false
fallbackValidationScripts:
- validation.py
- validate.py
- verify.py
- check.py
thinking: true
thinkingLevel: medium
approvalRequired: false
pauseAfterStep: false
approvalMessage: ''
timeoutEnabled: true
timeoutMinutes: 3.0
reviewMode: new_agent
confidenceThreshold: 0.7
passKeywords: PASS
failKeywords: FAIL, BLOCKED, RISK
aggregatorFunction: keyword_confidence
contextArtifacts:
- spec.md
- auto-generation-result.md
sources: []
agentOptions: {}
path: contracts/adaptive-auto-workflow/ai_review.yaml
compactPrompt: true
includeSkillContext: false
compactRetryPromptWhenReusingSession: true
reviewOutputFormat: json
retryPolicy:
  defaultRetryTo: auto_generation
  escalateEvery: 3
  escalateTo: generate_task_prompts
  maxRetries: 99

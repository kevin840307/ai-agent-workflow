id: final_gate
key: final_gate
name: Final Regression Package Gate
description: Require dry-run-report.md to contain Status PASS before considering the package complete.
enabled: true
type: gate
skill: steps/regression-test-case-generation/final_gate.md
command: ''
agent: qwen
outputs:
- dry-run-report.md
function: require_status_pass
retry: 5
failAction: selected_step
retryFromStepKey: dry_run
keepSameSession: true
injectFailureFeedback: true
stopAfterFailures: 5
allowInteraction: false
timeoutEnabled: false
timeoutMinutes: 0.0
reviewMode: none
path: contracts/regression-test-case-generation/final_gate.yaml
functions:
- require_status_pass
retryPolicy:
  defaultRetryTo: dry_run
  maxRetries: 5
